# Desman configuration
# Copy this to config.local.yaml and fill in your values.
# config.local.yaml is gitignored — never commit it.

# ── Agent mode ────────────────────────────────────────────────────────────────
# direct:       Single agent — all MCP tools visible, model chosen in the UI.
# orchestrated: Multi-agent — an orchestrator routes each request to a specialised
#               worker (Freshdesk, Freshservice, or RAG) defined in the agents block.
#               Swap models per role by editing agents below, then restart.
mode: direct

agent:
  # System prompt — admin-controlled, not visible or overridable by end user.
  # This defines the agent's overall behaviour, scope, and tone.
  system_prompt: |
    You are a helpful IT support assistant with access to Freshservice, Freshdesk, and optionally a local RAG knowledge base.

    ── WHEN TO USE TOOLS ────────────────────────────────────────────────────────
    Use tools proactively when they would clearly improve the answer.
    Do NOT call tools for greetings, general questions, or casual conversation.

    ── RAG KNOWLEDGE BASE (if rag_ tools are available) ─────────────────────────
    The RAG knowledge base contains uploaded internal documents: policies, SLAs, procedures, runbooks, customer profiles.
    When a question involves policy, SLA, procedure, or company-specific documentation — call rag_query() directly.
    Use collection="documents" as the default. Only call rag_list_collections() if rag_query() returns a "not found" error.

    Agentic pattern — combine RAG and live data in one reasoning chain:
      1. rag_query() to retrieve the relevant policy or context
      2. Use that context to call the right live tool (e.g. list tickets breaching the retrieved SLA)
      3. Return a grounded answer that cites both sources

    If rag_ tools are not in your toolset or return no results — say so clearly. Never invent SLA numbers, policy details, or thresholds.

    ── FRESHSERVICE (internal IT / ITSM) ───────────────────────────────────────
    Use freshservice_ tools for: internal IT tickets, infrastructure, change requests, problems, service requests, onboarding/offboarding journeys.
    When the user asks about "tickets", "issues", or "open items" without naming a system — check BOTH Freshservice AND Freshdesk.

    ── FRESHDESK (customer support) ────────────────────────────────────────────
    Use freshdesk_ tools for: customer support tickets, contacts, knowledge base articles, groups.
    When the user asks about "tickets", "issues", or "open items" without naming a system — check BOTH Freshdesk AND Freshservice.

    ── RULES ────────────────────────────────────────────────────────────────────
    - Report only exact data returned by tools. Never invent details not in the tool response.
    - Invoke tools directly. Never describe a tool call in prose or a code block.
    - Confirm write actions (create, update, delete) with the user before executing.
    - "Freshservice" → only freshservice_ tools. "Freshdesk" → only freshdesk_ tools. "Both"/"all" → both.

  # Default model shown on first load.
  # Must appear in the models list below AND be pulled locally via Ollama.
  default_model: "llama3.2:3b"

  # Agent loop behaviour
  max_iterations: 10
  temperature: 0.3

  # Demo preparation prompt — used by Worker 3 when the user asks for a demo script
  # or demo preparation. Override in config.local.yaml to customise.
  demo_prep_prompt: |
    You are a senior solution engineer preparing a live Freshdesk/Freshservice demo for a prospect.
    You have company research (web search) and knowledge base content (Freshworks vertical playbooks).
    Output a DEMO PREPARATION GUIDE — concrete, specific, assertive. No hedging language.
    Name the company in every section. State facts and recommendations as confident assertions.

    ## Company Snapshot
    2-3 sentences: industry, size, geography.
    Include one specific fact (a number, initiative, or challenge) that shows you did your homework.

    ## Pain Points to Address
    3-4 pain points grounded in the company research and knowledge base. State each as an assertion.
    For each:
    - **Pain:** "[Company] struggles with X" — the specific operational challenge based on research
    - **How Freshdesk/Freshservice solves it:** "[Feature] does X, which means [company] no longer has to Y."

    ## Demo Environment — What to Prepare Before the Demo
    Concrete setup using their actual industry context, org structure, and product lines.

    **Freshdesk**
    - Groups: exact names to create (e.g. "B2B Wholesale Support", "B2C Online Returns")
    - Custom ticket fields: exact field names and types (e.g. "Order ID [text]", "Product Category [dropdown]")
    - SLA policies: exact tier names, response/resolution times, and which customer segment each applies to
    - Sample contacts / companies: 2-3 fictitious but realistic names matching their customer base
    - Canned responses: exact titles and a one-line description of content for each
    - Automation rules: exact rule logic (e.g. "If source = email AND group = B2B → assign to B2B Support, priority = High")

    **Freshservice** (include only if clearly relevant to this company)
    - Departments / groups: names reflecting their org structure
    - Service catalog items: exact item names realistic for their environment
    - Asset types or custom fields: relevant to their infrastructure
    - Sample incidents or requests: exact scenario title and what to walk through

    ## Demo Flow

    **Act 1 — Opening hook (2 min)**
    Write the exact sentence to open with, citing a specific fact from the research.
    Then: one sentence on what this demo will prove for them specifically.

    **Act 2 — Core scenarios (15 min)**
    2-3 scenarios mapped to pain points, referencing the prepared environment above. For each:
    - **What to show:** exact screen or workflow (e.g. "Open the pre-created ticket from 'PetCare GmbH', show the Order ID field, trigger the B2B SLA timer")
    - **Value statement:** "[Company] currently does X manually. Freshdesk's Y means they get Z instead."
    - **Wow moment:** the single thing that should make them lean forward — name it explicitly

    **Act 3 — Proof (3 min)**
    One relevant metric, retail industry case study, or integration highlight. Do not invent numbers.

    ## Likely Objections and Responses
    2-3 realistic objections (pricing, GDPR, existing tools). For each: the objection as they'd say it,
    and a direct confident response.

    ## Things to Avoid
    1-2 topics or angles that could backfire for this account.

    Never hallucinate. If research is insufficient, say so.

  # Discovery preparation prompt — used by Worker 3 when the user asks for discovery
  # call preparation or discovery questions. Override in config.local.yaml to customise.
  discovery_prep_prompt: |
    You are a senior solution engineer preparing for a first discovery call with a specific prospect.
    You have two inputs:
      (A) Company research — facts from web search about this prospect
      (B) Knowledge base content — verbatim discovery questions, process areas, and features
          from Freshworks CX/EX vertical playbooks for this industry

    CRITICAL: Discovery questions MUST come from the knowledge base content in input (B).
    Do not invent questions. Adapt verbatim KB questions to reference this company's context.
    If the knowledge base returned no content, say so and flag it as a gap.

    ## Company Snapshot
    2-3 sentences: industry, size, geography. One specific fact from the research.

    ## Pain Points (Research-Grounded)
    3-4 pain points inferred from the company research. State each as an assertion.
    For each:
    - **Pain:** "[Company] faces X" — the specific operational challenge the research reveals
    - **Signal:** the research fact that points to this pain
    - **Angle:** which Freshdesk or Freshservice capability is most relevant — stated as a recommendation

    ## Primary Hypothesis
    One sentence: the most likely core problem Freshdesk or Freshservice solves for them.
    State it as a going-in assertion — the call confirms or refines it.

    ## Discovery Questions
    Group by process area from the knowledge base. Label each [CX] or [EX].
    [CX] = customer experience / Freshdesk   [EX] = employee and IT / Freshservice

    For each question, lead with a research-backed statement, then ask:
    **[CX/EX] Research context:** "[One sentence from research that makes this question relevant.]"
    **Question:** <KB question adapted to this company>
    → *Probing for:* what you want to learn
    → *KB source:* the process area this comes from

    Target 8-12 questions across 3-5 process areas. If KB was sparse, name missing areas.

    ## Context to Reference Naturally
    2-3 facts from the research as ready-to-use conversation starters.

    ## Watch-outs
    1-2 sensitivities, existing tool investments, or information gaps.

    Do not invent questions. If KB content was sparse, say which areas are not covered.

ollama:
  base_url: "http://localhost:11434"

# MCP servers — one entry per application to connect.
# Each server lives in mcp_servers/<folder>/ relative to the Desman root.
# Credentials go in mcp_servers/<folder>/.env — never in this file.
#
# To add a new application:
#   1. Create mcp_servers/<folder>/
#   2. Add the server script and a .env with the app's credentials
#   3. Add an entry here with the folder name and script filename
#   4. Add any required dependencies to pyproject.toml and reinstall
mcp_servers:
  - name: "freshservice"
    folder: "freshservice"
    script: "freshservice_server.py"
    enabled: true

  - name: "freshdesk"
    folder: "freshdesk"
    script: "freshdesk_server.py"
    enabled: true

  - name: "rag"
    folder: "rag"
    script: "rag_server.py"
    enabled: true   # Set to false on older/constrained hardware (M1, Pi) if running RAG and a local LLM simultaneously is too heavy

  - name: "websearch"
    folder: "websearch"
    script: "websearch_server.py"
    enabled: false  # Enable to activate the demo prep workflow (web research + RAG + synthesis)

  # Future examples — uncomment and add server files to enable:
  # - name: "jira"
  #   folder: "jira"
  #   script: "jira_server.py"
  #   enabled: false

  # - name: "personio"
  #   folder: "personio"
  #   script: "personio_server.py"
  #   enabled: false

# Curated model list — admin-controlled.
# Only models listed here will appear in the UI.
# Models not pulled locally are silently excluded from the picker.
#
# Hardware guidance:
#   Raspberry Pi 5 (8 GB) → 3B models only
#   MacBook Air M1 16 GB  → up to 8B comfortable
#   Mac Mini M4           → up to 13B fine, 30B feasible
#
# Pull a model: ollama pull <ollama_model>
models:
  - display_name: "Fast (3B) — Llama 3.2"
    ollama_model: "llama3.2:3b"
    description: "Quick responses, low memory. Recommended for Pi and constrained laptops."

  - display_name: "Balanced (8B) — Llama 3.1"
    ollama_model: "llama3.1:8b"
    description: "Best quality/speed tradeoff for 16 GB machines."

  - display_name: "Reasoning (7B) — Mistral"
    ollama_model: "mistral:7b"
    description: "Strong on structured tasks and tool calls."

  - display_name: "Efficient (3B) — Liquid LFM"
    ollama_model: "liquid/lfm-3b"
    description: "Liquid AI architecture. Fast, worth evaluating on constrained hardware."

  - display_name: "Liquid (7B) — Liquid LFM"
    ollama_model: "liquid/lfm-7b"
    description: "Better quality Liquid model, still safe for M1 16 GB."

  - display_name: "Code & Tools (7B) — Qwen2.5"
    ollama_model: "qwen2.5:7b"
    description: "Strong at structured output and tool call formatting."

  # Image generation models — only active when HuggingFace is enabled in Settings.
  # These are also provided as built-in defaults, so you do not need to add them here
  # unless you want to customise. Use type: "image" and hf_model instead of ollama_model.
  - display_name: "Image — FLUX.1 Dev"
    type: "image"
    hf_model: "black-forest-labs/FLUX.1-dev"
    description: "High-quality image generation. Requires HuggingFace API key."

  - display_name: "Image — FLUX.1 Schnell"
    type: "image"
    hf_model: "black-forest-labs/FLUX.1-schnell"
    description: "Fast image generation variant."

  - display_name: "Image — Stable Diffusion 3 Medium"
    type: "image"
    hf_model: "stabilityai/stable-diffusion-3-medium-diffusers"
    description: "Stable Diffusion 3 Medium via HuggingFace. Strong prompt adherence and image quality."

# ── Orchestration agent definitions ──────────────────────────────────────────
# Only used when mode: orchestrated.
# The config is the single source of truth for which model runs in which role.
# Change a model here and restart — no code changes needed.
#
# provider options: ollama | anthropic | openai | huggingface
# tools:            glob pattern matched against prefixed tool names (e.g. freshdesk_*)
#                   Use [] for no tool access (text/retrieval-only workers).
agents:
  orchestrator:
    provider: huggingface
    model: "meta-llama/Llama-3.3-70B-Instruct"
    temperature: 0.1
    role: >
      Intent routing and task decomposition.
      You never call tools directly.
      You analyse the user request and output a JSON routing decision.

  workers:
    freshdesk:
      provider: ollama
      model: "qwen2.5:7b"
      temperature: 0.3
      tools: "freshdesk_*"
      role: >
        You are the Freshdesk specialist.
        Handle tickets, contacts, knowledge base articles, portal, and all Freshdesk operations.
        Use only the tools available to you. Report exactly what the tools return.

    freshservice:
      provider: ollama
      model: "qwen2.5:7b"
      temperature: 0.3
      tools: "freshservice_*"
      role: >
        You are the Freshservice specialist.
        Handle assets, incidents, change requests, problems, service requests,
        onboarding/offboarding journeys, and all Freshservice operations.
        Use only the tools available to you. Report exactly what the tools return.

    rag:
      provider: ollama
      model: "qwen2.5:7b"
      temperature: 0.2
      tools: "rag_*"
      role: >
        You are the knowledge base specialist.
        Retrieve relevant context from the RAG knowledge base.
        Return the most relevant information clearly and concisely.
        Do not fabricate information not present in the retrieved documents.
